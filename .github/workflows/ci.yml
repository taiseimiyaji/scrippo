name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    # swiftc(postinstall の bin/ocr ビルド)に macOS が必要
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install (postinstall builds bin/ocr with swiftc)
        run: npm ci
      - name: Test
        run: npm test
      - name: Build JS (same as prepack)
        run: npm run build:js
      - name: Verify package contents
        run: npm publish --dry-run
