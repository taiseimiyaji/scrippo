name: Publish to npm

# GitHub Release を publish すると npm へ公開する(workflow_dispatch で手動再実行も可)。
# 認証は npm の Trusted Publishing (GitHub Actions OIDC) を使用 — トークン不要・provenance 付き。
# 事前に npmjs.com のパッケージ設定で Trusted Publisher として
# このリポジトリ + このワークフローファイル名を登録しておくこと。
# 注: Node 24 同梱の npm (>=11.6) が Trusted Publishing 要件 (>=11.5) を満たすため
#     npm 自体のアップグレードは行わない(`npm install -g npm` は同梱 npm を壊すことがある)。
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC (npm Trusted Publishing)

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Install
        run: npm ci
      - name: Test
        run: npm test
      - name: Check version matches release tag
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "package.json version ($PKG_VERSION) != release tag ($TAG)" >&2
            exit 1
          fi
      - name: Publish (prepack builds dist/)
        run: npm publish
